site_name: Fledgling
site_description: MCP tools that help AI agents get their bearings in a codebase
site_url: https://fledgling.readthedocs.io
repo_url: https://github.com/teaguesterling/fledgling
repo_name: teaguesterling/fledgling

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - SQL Builder: https://teaguesterling.github.io/fledgling/
  - Macro Reference:
      - Source Retrieval: macros/source.md
      - Code Intelligence: macros/code.md
      - Documentation: macros/docs.md
      - Repository: macros/repo.md
      - Conversations: macros/conversations.md
  - Vision:
      - Product Spec: vision/PRODUCT_SPEC.md
      - Conversation Analysis: vision/CONVERSATION_ANALYSIS.md
      - Schema Design: vision/CONVERSATION_SCHEMA_DESIGN.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/teaguesterling/fledgling
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/fledgling-mcp/
    - icon: material/database
      link: https://teaguesterling.github.io/fledgling/
      name: SQL-only builder
